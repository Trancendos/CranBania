# Forgejo Actions — in-repo CI (test, lint, build). Zero GitHub Actions minutes.
# Enable Actions on your Forgejo instance; runs on self-hosted runners.
name: CranBania CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
